<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B7B8E20"/>
      <stop offset="100%" style="stop-color:#9B7B8E40"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="100" fill="url(#bg)"/>
  <!-- snowflake top-right -->
  <g transform="translate(158,42)" opacity="0.25">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#9B7B8E" stroke-width="1.5"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke="#9B7B8E" stroke-width="1.5"/>
    <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke="#9B7B8E" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="-3" y2="-7" stroke="#9B7B8E" stroke-width="1"/>
    <line x1="0" y1="-10" x2="3" y2="-7" stroke="#9B7B8E" stroke-width="1"/>
    <line x1="0" y1="10" x2="-3" y2="7" stroke="#9B7B8E" stroke-width="1"/>
    <line x1="0" y1="10" x2="3" y2="7" stroke="#9B7B8E" stroke-width="1"/>
  </g>
  <!-- snowflake bottom-left -->
  <g transform="translate(40,158) scale(0.7)" opacity="0.18">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#9B7B8E" stroke-width="1.5"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke="#9B7B8E" stroke-width="1.5"/>
    <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke="#9B7B8E" stroke-width="1.5"/>
  </g>
  <!-- tiny snowflake -->
  <g transform="translate(50,45) scale(0.4)" opacity="0.15">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#9B7B8E" stroke-width="2"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke="#9B7B8E" stroke-width="2"/>
    <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke="#9B7B8E" stroke-width="2"/>
  </g>
  <text x="100" y="115" text-anchor="middle" font-family="serif" font-size="72" font-weight="bold" fill="#9B7B8E">辛</text>
</svg>